<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Geometry of Time</title>
    <style>
        :root {
            --bg: #fbfbfa;
            --surface: #ffffff;
            --text-main: #1c1c1c;
            --text-muted: #787774;
            --border: #ecebe9;
            --consistency: #3b5943; 
            --intensity: #c96f53;   
            --decay: #9e2a2b;       
            --zero: #d1d0cd;        
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            -webkit-font-smoothing: antialiased;
        }

        .wrapper { width: 100%; max-width: 760px; }
        header { text-align: center; margin-bottom: 2rem; }
        h1 { font-size: 1.6rem; font-weight: 400; letter-spacing: -0.02em; margin-bottom: 0.4rem; }
        p.subtitle { font-size: 0.9rem; color: var(--text-muted); font-weight: 300; }

        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.025);
            padding: 4px;
            border-radius: 99px;
            margin: 0 auto 2rem auto;
            width: max-content;
        }

        .tabs button {
            background: transparent;
            border: none;
            padding: 0.5rem 1.2rem;
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--text-muted);
            border-radius: 99px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tabs button.active {
            background: var(--surface);
            color: var(--text-main);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
        }

        .canvas-card {
            background: var(--surface);
            border-radius: 14px;
            padding: 1.75rem;
            border: 1px solid var(--border);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.01);
            margin-bottom: 1.5rem;
        }

        .canvas-container { position: relative; width: 100%; height: 340px; }
        canvas { width: 100%; height: 100%; }

        .legend {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
            margin-top: 0.5rem;
        }

        .legend-item { display: flex; flex-direction: column; gap: 0.2rem; }
        .legend-label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-label::before { content: ''; width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
        .con-label { color: var(--consistency); } .con-label::before { background: var(--consistency); }
        .int-label { color: var(--intensity); } .int-label::before { background: var(--intensity); }
        .base-label { color: #8a8986; } .base-label::before { background: var(--zero); }
        .dec-label { color: var(--decay); } .dec-label::before { background: var(--decay); }

        .legend-desc { font-size: 0.75rem; color: var(--text-muted); line-height: 1.4; font-weight: 300; }
        #lesson-box { text-align: center; font-size: 0.9rem; line-height: 1.6; color: var(--text-main); font-weight: 300; padding: 0 1rem; min-height: 50px; }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <h1>The Horizon of 30 Years</h1>
            <p class="subtitle">How tiny actions compound—or decay—over a generation.</p>
        </header>

        <div class="tabs">
            <button class="active" onclick="switchTab(this, 'health')">Health</button>
            <button onclick="switchTab(this, 'money')">Wealth</button>
            <button onclick="switchTab(this, 'learning')">Mind</button>
            <button onclick="switchTab(this, 'relationships')">Bonds</button>
        </div>

        <div class="canvas-card">
            <div class="canvas-container">
                <canvas id="horizonChart"></canvas>
            </div>
            
            <div class="legend">
                <div class="legend-item">
                    <span class="legend-label con-label">Consistency</span>
                    <span class="legend-desc">Unstoppable exponential growth.</span>
                </div>
                <div class="legend-item">
                    <span class="legend-label int-label">Intensity</span>
                    <span class="legend-desc">Bursts that fizzle back to baseline.</span>
                </div>
                <div class="legend-item">
                    <span class="legend-label base-label">Doing Nothing</span>
                    <span class="legend-desc">The absolute flat baseline.</span>
                </div>
                <div class="legend-item">
                    <span class="legend-label dec-label">Active Decay</span>
                    <span class="legend-desc">Negative choices dipping below zero.</span>
                </div>
            </div>
        </div>

        <div id="lesson-box"></div>
    </div>

    <script>
        const dataConfig = {
            health: {
                msg: "“Consistent daily walks and clean fuel create a vibrant 30-year engine. Rare, exhausting fitness kicks do not protect you. Doing nothing keeps you frail, while active abuse drops your health below zero.”",
                // Map values between -100 and +300
                formula: (y, m) => m === 'con' ? 0 + (y * 8.5) : m === 'int' ? (y % 6 < 1 ? 35 : 0) : m === 'base' ? 0 : 0 - (y * 2.8)
            },
            money: {
                msg: "“Investing a single dollar every day lets decades of compounding create a fortress. Chasing intense lottery-style trends leaves you empty. Doing nothing builds zero growth; borrowing or wasting creates debt.”",
                formula: (y, m) => m === 'con' ? 10 * Math.pow(1.11, y) - 10 : m === 'int' ? (y === 8 || y === 18 || y === 26 ? 60 : 0) : m === 'base' ? 0 : 0 - (y * 2.5)
            },
            learning: {
                msg: "“Reading just 10 pages a day compounds into profound wisdom over 30 years. Intense cramming sessions are quickly forgotten. Stagnation leaves you stuck, while digital distractions actively decay focus.”",
                formula: (y, m) => m === 'con' ? 0 + (y * 9) : m === 'int' ? (Math.floor(y/3) % 2 === 0 ? 25 : 0) : m === 'base' ? 0 : 0 - (100 * (1 - Math.exp(-y*0.08)))
            },
            relationships: {
                msg: "“Small, daily gestures of affection forge lifelong, unbreakable bonds. Grand, sporadic apology gifts cannot replace presence. Neglect results in zero depth; continuous friction breaks ties completely.”",
                formula: (y, m) => m === 'con' ? 0 + (y * 7.5) : m === 'int' ? (y % 5 === 0 ? 45 : -5) : m === 'base' ? 0 : 0 - (y * 3.1)
            }
        };

        let activeTab = 'health';
        const canvas = document.getElementById('horizonChart');
        const ctx = canvas.getContext('2d');

        function drawChart() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);

            const w = rect.width;
            const h = rect.height;
            const padL = 35, padR = 20, padT = 20, padB = 30;
            const graphW = w - padL - padR;
            const graphH = h - padT - padB;

            ctx.clearRect(0, 0, w, h);

            // Establish "Zero Baseline" position internally (2/3 down the graph)
            const zeroY = padT + (graphH * 0.7);

            // Render Time Labels (Years 0 to 30)
            ctx.fillStyle = '#b5b4b0';
            ctx.font = '10px -apple-system, sans-serif';
            ctx.textAlign = 'center';
            for (let y = 0; y <= 30; y += 10) {
                let x = padL + (y / 30) * graphW;
                ctx.fillText(y === 0 ? 'Start' : 'Yr ' + y, x, h - 10);
            }

            // 1. Draw the absolute "Doing Nothing" / Zero Baseline Line
            ctx.strokeStyle = '#d1d0cd';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 4]); // Clean dash structure
            ctx.beginPath();
            ctx.moveTo(padL, zeroY);
            ctx.lineTo(padL + graphW, zeroY);
            ctx.stroke();
            ctx.setLineDash([]); // Reset dash for dynamic paths

            // Scaling helper to map formula scores cleanly between the +300 / -100 grid bounds
            const getPoints = (mode) => {
                let points = [];
                for (let y = 0; y <= 30; y += 0.2) {
                    let score = dataConfig[activeTab].formula(y, mode);
                    let x = padL + (y / 30) * graphW;
                    // positive scores go up from zero, negative scores sink down
                    let yPos = zeroY - (score / 300) * (graphH * 0.7); 
                    points.push({x, y: yPos});
                }
                return points;
            };

            const drawPath = (points, color, width) => {
                ctx.beginPath();
                ctx.strokeStyle = color;
                ctx.lineWidth = width;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.moveTo(points[0].x, points[0].y);
                for (let i = 1; i < points.length; i++) {
                    ctx.lineTo(points[i].x, points[i].y);
                }
                ctx.stroke();
            };

            // Render with intentional depth layers
            drawPath(getPoints('dec'), '#9e2a2b', 1.5);
            drawPath(getPoints('int'), '#c96f53', 1.5);
            drawPath(getPoints('con'), '#3b5943', 3.5); 

            document.getElementById('lesson-box').innerText = dataConfig[activeTab].msg;
        }

        function switchTab(el, tabName) {
            document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            activeTab = tabName;
            drawChart();
        }

        window.addEventListener('resize', drawChart);
        setTimeout(drawChart, 50);
    </script>
</body>
</html>
