<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Geometry of Habits</title>
    <style>
        :root {
            --bg: #f9f8f6;
            --surface: #ffffff;
            --text-main: #1c1c1c;
            --text-muted: #706f6c;
            --border: #eae9e6;
            
            /* Premium Zen Palette */
            --consistency: #4a6b52; /* Deep Sage */
            --intensity: #c27d66;   /* Terracotta */
            --decay: #a8a7a4;       /* Warm Gray */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            -webkit-font-smoothing: antialiased;
        }

        .wrapper {
            width: 100%;
            max-width: 720px;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 400;
            letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        /* Premium Minimal Pill Selector */
        .tabs {
            display: inline-flex;
            background: rgba(0, 0, 0, 0.03);
            padding: 4px;
            border-radius: 99px;
            margin: 0 auto 2.5rem auto;
            display: flex;
            width: max-content;
        }

        .tabs button {
            background: transparent;
            border: none;
            padding: 0.6rem 1.2rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            border-radius: 99px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tabs button:hover {
            color: var(--text-main);
        }

        .tabs button.active {
            background: var(--surface);
            color: var(--text-main);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        /* Canvas Card Box */
        .canvas-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.015);
            position: relative;
            margin-bottom: 2rem;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            height: 320px;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        /* High-readability Info Architecture */
        .legend {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
            margin-top: 0.5rem;
        }

        .legend-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            width: 30%;
        }

        .legend-label {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-label::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .con-label { color: var(--consistency); }
        .con-label::before { background: var(--consistency); }
        .int-label { color: var(--intensity); }
        .int-label::before { background: var(--intensity); }
        .dec-label { color: var(--decay); }
        .dec-label::before { background: var(--decay); }

        .legend-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.4;
            font-weight: 300;
        }

        /* Bottom Narrative */
        #lesson-box {
            text-align: center;
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-main);
            font-weight: 300;
            padding: 0 1rem;
            min-height: 60px;
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <h1>The Geometry of Habits</h1>
            <p class="subtitle">A visual look at time, effort, and choices.</p>
        </header>

        <div class="tabs">
            <button class="active" onclick="switchTab(this, 'health')">Health</button>
            <button onclick="switchTab(this, 'money')">Money</button>
            <button onclick="switchTab(this, 'learning')">Learning</button>
            <button onclick="switchTab(this, 'relationships')">Connection</button>
        </div>

        <div class="canvas-card">
            <div class="canvas-container">
                <canvas id="habitChart"></canvas>
            </div>
            
            <div class="legend">
                <div class="legend-item">
                    <span class="legend-label con-label">Consistency</span>
                    <span class="legend-desc">Small daily efforts that compound quietly over time.</span>
                </div>
                <div class="legend-item">
                    <span class="legend-label int-label">Intensity</span>
                    <span class="legend-desc">Massive bursts of energy followed by long pauses.</span>
                </div>
                <div class="legend-item">
                    <span class="legend-label dec-label">Decay</span>
                    <span class="legend-desc">The slow, unnoticeable toll of neglect or inaction.</span>
                </div>
            </div>
        </div>

        <div id="lesson-box"></div>
    </div>

    <script>
        const dataConfig = {
            health: {
                msg: "“Eating well and moving lightly every day builds a vibrant engine. Drastic weekend-only workouts cause injury, while complete neglect slowly saps your daily energy.”",
                formula: (t, m) => m === 'con' ? 60 + t * 0.4 : m === 'int' ? 60 + (Math.sin(t/8) > 0.85 ? 40 : 0) + (t * 0.04) : 60 - t * 0.15
            },
            money: {
                msg: "“Saving small amounts continuously lets compound growth work its magic. Chasing trendy, overnight financial wins usually crashes, while unthinking spending drains wealth entirely.”",
                formula: (t, m) => m === 'con' ? 35 * Math.pow(1.0045, t) : m === 'int' ? (t < 120 ? 35 : t < 260 ? 110 : 45) : 35 * Math.pow(0.995, t)
            },
            learning: {
                msg: "“Devoting fifteen minutes a day to a skill yields true mastery. Cramming aggressively for hours before a deadline results in quick forgetting, while ignoring curiosity dulls the mind.”",
                formula: (t, m) => m === 'con' ? 30 + t * 0.45 : m === 'int' ? (Math.floor(t/45) % 2 === 0 ? 65 : 30) + (t * 0.05) : 30 / (1 + t * 0.012)
            },
            relationships: {
                msg: "“Showing small, deliberate acts of kindness retains flawless trust. Throwing massive apology gifts after weeks of silence feels hollow, while taking others for granted causes slow drift.”",
                formula: (t, m) => m === 'con' ? 70 + t * 0.32 : m === 'int' ? 70 + (t % 90 < 6 ? 40 : -8) : 70 - t * 0.2
            }
        };

        let activeTab = 'health';
        const canvas = document.getElementById('habitChart');
        const ctx = canvas.getContext('2d');
        const colors = { con: '#4a6b52', int: '#c27d66', dec: '#a8a7a4' };

        function drawChart() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);

            const w = rect.width;
            const h = rect.height;
            const paddingLeft = 15;
            const paddingBottom = 20;
            const graphW = w - paddingLeft * 2;
            const graphH = h - paddingBottom * 2;

            ctx.clearRect(0, 0, w, h);

            // X-Axis Baseline
            ctx.strokeStyle = '#eae9e6';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(paddingLeft, h - paddingBottom);
            ctx.lineTo(w - paddingLeft, h - paddingBottom);
            ctx.stroke();

            // Render Paths
            const plot = (mode, width) => {
                ctx.beginPath();
                ctx.strokeStyle = colors[mode];
                ctx.lineWidth = width;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                for (let t = 0; t <= 365; t++) {
                    let val = dataConfig[activeTab].formula(t, mode);
                    let x = paddingLeft + (t / 365) * graphW;
                    // Maps scale boundary comfortably into card limits
                    let y = (h - paddingBottom) - (val / 160) * graphH; 

                    if (t === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke();
            };

            plot('dec', 1.5);
            plot('int', 1.5);
            plot('con', 3.5); // Highlight consistency with subtle thickness superiority

            // Fade-in text narrative update
            const lessonBox = document.getElementById('lesson-box');
            lessonBox.innerText = dataConfig[activeTab].msg;
        }

        function switchTab(el, tabName) {
            document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            activeTab = tabName;
            drawChart();
        }

        window.addEventListener('resize', drawChart);
        // Clean initialization entry
        setTimeout(drawChart, 50);
    </script>
</body>
</html>
