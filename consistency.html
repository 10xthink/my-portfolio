<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Geometry of Time</title>
    <style>
        :root {
            --bg: #fbfbfa;
            --surface: #ffffff;
            --text-main: #1c1c1c;
            --text-muted: #787774;
            --border: #ecebe9;
            --consistency: #3b5943; 
            --intensity: #c96f53;   
            --decay: #9e2a2b;       
            --zero: #d1d0cd;        
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            -webkit-font-smoothing: antialiased;
        }

        .wrapper { width: 100%; max-width: 760px; }
        header { text-align: center; margin-bottom: 2rem; }
        h1 { font-size: 1.6rem; font-weight: 400; letter-spacing: -0.02em; margin-bottom: 0.4rem; }
        p.subtitle { font-size: 0.9rem; color: var(--text-muted); font-weight: 300; }

        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.025);
            padding: 4px;
            border-radius: 99px;
            margin: 0 auto 1.5rem auto;
            width: max-content;
        }

        .tabs button {
            background: transparent;
            border: none;
            padding: 0.5rem 1.2rem;
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--text-muted);
            border-radius: 99px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tabs button.active {
            background: var(--surface);
            color: var(--text-main);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
        }

        /* Premium Slider */
        .timeline-control {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
            gap: 0.75rem;
        }

        .timeline-control label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .timeline-control label span {
            color: var(--consistency);
            font-weight: 600;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 80%;
            max-width: 400px;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: var(--consistency);
            cursor: pointer;
            margin-top: -7px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        input[type=range]::-webkit-slider-thumb:active { transform: scale(1.2); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: var(--border); border-radius: 4px; }
        input[type=range]:focus { outline: none; }

        .canvas-card {
            background: var(--surface);
            border-radius: 14px;
            padding: 1.75rem;
            border: 1px solid var(--border);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.01);
            margin-bottom: 1.5rem;
        }

        .canvas-container { position: relative; width: 100%; height: 340px; }
        canvas { width: 100%; height: 100%; }

        .legend {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
            margin-top: 0.5rem;
        }

        .legend-item { display: flex; flex-direction: column; gap: 0.2rem; }
        .legend-label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-label::before { content: ''; width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
        .con-label { color: var(--consistency); } .con-label::before { background: var(--consistency); }
        .int-label { color: var(--intensity); } .int-label::before { background: var(--intensity); }
        .base-label { color: #8a8986; } .base-label::before { background: var(--zero); }
        .dec-label { color: var(--decay); } .dec-label::before { background: var(--decay); }

        .legend-desc { font-size: 0.75rem; color: var(--text-muted); line-height: 1.4; font-weight: 300; }
        #lesson-box { text-align: center; font-size: 0.95rem; line-height: 1.6; color: var(--text-main); font-weight: 300; padding: 0 1rem; min-height: 50px; }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <h1>The Geometry of Time</h1>
            <p class="subtitle">Drag the timeline to see how effort hides before it compounds.</p>
        </header>

        <div class="tabs">
            <button class="active" onclick="switchTab(this, 'health')">Health</button>
            <button onclick="switchTab(this, 'money')">Wealth</button>
            <button onclick="switchTab(this, 'learning')">Mind</button>
            <button onclick="switchTab(this, 'relationships')">Bonds</button>
        </div>

        <div class="timeline-control">
            <label>Duration: <span id="year-label">30</span> Years</label>
            <input type="range" id="yearSlider" min="1" max="50" value="30" oninput="updateSlider()">
        </div>

        <div class="canvas-card">
            <div class="canvas-container">
                <canvas id="horizonChart"></canvas>
            </div>
            
            <div class="legend">
                <div class="legend-item">
                    <span class="legend-label con-label">Consistency</span>
                    <span class="legend-desc">Silent early on, explosive later.</span>
                </div>
                <div class="legend-item">
                    <span class="legend-label int-label">Intensity</span>
                    <span class="legend-desc">Bursts that fizzle back to baseline.</span>
                </div>
                <div class="legend-item">
                    <span class="legend-label base-label">Doing Nothing</span>
                    <span class="legend-desc">The absolute flat baseline.</span>
                </div>
                <div class="legend-item">
                    <span class="legend-label dec-label">Active Decay</span>
                    <span class="legend-desc">Negative choices dipping below zero.</span>
                </div>
            </div>
        </div>

        <div id="lesson-box"></div>
    </div>

    <script>
        // A helper function to create a clean exponential compounding curve up to a max value
        const compound = (y, rate, maxScore) => maxScore * ((Math.pow(rate, y) - 1) / (Math.pow(rate, 50) - 1));

        const dataConfig = {
            health: {
                msg: "“Notice how eating well and moving daily shows almost no visible results for the first few years. But as you pass year 20, the vitality gap becomes massive.”",
                formula: (y, m) => m === 'con' ? compound(y, 1.09, 100) : m === 'int' ? (y % 8 < 1.5 ? 20 : 0) : m === 'base' ? 0 : 0 - (y * 0.9)
            },
            money: {
                msg: "“Saving a tiny amount daily feels useless at year 3. By year 40, the momentum is unstoppable. Intense, risky bets (spikes) usually wipe out and drop back to zero.”",
                formula: (y, m) => m === 'con' ? compound(y, 1.12, 100) : m === 'int' ? (y === 5 || y === 18 || y === 32 ? 35 : 0) : m === 'base' ? 0 : 0 - (y * 1.2)
            },
            learning: {
                msg: "“Reading 10 pages a day won't make you a genius in a month. But over decades, the accumulated wisdom forms a hockey-stick curve. Stagnation rots the mind over time.”",
                formula: (y, m) => m === 'con' ? compound(y, 1.10, 100) : m === 'int' ? (Math.floor(y/4) % 2 === 0 ? 15 : 0) : m === 'base' ? 0 : -30 * (1 - Math.exp(-y*0.05))
            },
            relationships: {
                msg: "“Trust takes decades to compound. Grand apologies and intense gestures look big at the moment, but without consistency, the relationship returns to baseline.”",
                formula: (y, m) => m === 'con' ? compound(y, 1.07, 100) : m === 'int' ? (y % 6 === 0 ? 25 : -2) : m === 'base' ? 0 : 0 - (y * 1.0)
            }
        };

        let activeTab = 'health';
        let currentYears = 30;
        const MAX_YEARS = 50;
        const canvas = document.getElementById('horizonChart');
        const ctx = canvas.getContext('2d');
        const yearLabel = document.getElementById('year-label');
        const yearSlider = document.getElementById('yearSlider');

        function updateSlider() {
            currentYears = parseInt(yearSlider.value);
            yearLabel.innerText = currentYears;
            drawChart();
        }

        function drawChart() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);

            const w = rect.width;
            const h = rect.height;
            const padL = 35, padR = 20, padT = 20, padB = 30;
            const graphW = w - padL - padR;
            const graphH = h - padT - padB;

            ctx.clearRect(0, 0, w, h);

            // Establish "Zero Baseline" internally (3/4 down the graph to leave room for exponential peaks)
            const zeroY = padT + (graphH * 0.75);

            // Draw Background Timeline Grid (Fixed to 50 years so the frame of reference never moves)
            ctx.fillStyle = '#b5b4b0';
            ctx.font = '10px -apple-system, sans-serif';
            ctx.textAlign = 'center';
            for (let y = 0; y <= MAX_YEARS; y += 10) {
                let x = padL + (y / MAX_YEARS) * graphW;
                ctx.fillText(y === 0 ? 'Start' : 'Yr ' + y, x, h - 10);
                
                // Light vertical guidelines
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(0,0,0,0.03)';
                ctx.lineWidth = 1;
                ctx.moveTo(x, padT);
                ctx.lineTo(x, h - padB);
                ctx.stroke();
            }

            // Draw the absolute "Doing Nothing" / Zero Baseline Line
            ctx.strokeStyle = '#d1d0cd';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(padL, zeroY);
            ctx.lineTo(padL + graphW, zeroY);
            ctx.stroke();
            ctx.setLineDash([]);

            // Helper to get coordinates. 
            // Max score is normalized to 100 up, 50 down
            const getPoints = (mode) => {
                let points = [];
                // ONLY calculate up to the current selected year!
                for (let y = 0; y <= currentYears; y += 0.2) {
                    let score = dataConfig[activeTab].formula(y, mode);
                    let x = padL + (y / MAX_YEARS) * graphW;
                    let yPos = zeroY - (score / 100) * (graphH * 0.75); 
                    points.push({x, y: yPos});
                }
                return points;
            };

            const drawPath = (points, color, width) => {
                if(points.length === 0) return;
                ctx.beginPath();
                ctx.strokeStyle = color;
                ctx.lineWidth = width;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.moveTo(points[0].x, points[0].y);
                for (let i = 1; i < points.length; i++) {
                    ctx.lineTo(points[i].x, points[i].y);
                }
                ctx.stroke();

                // Draw a small dot at the leading edge to show "current point in time"
                let lastPoint = points[points.length - 1];
                ctx.beginPath();
                ctx.fillStyle = color;
                ctx.arc(lastPoint.x, lastPoint.y, width * 1.2, 0, Math.PI * 2);
                ctx.fill();
            };

            drawPath(getPoints('dec'), '#9e2a2b', 1.5);
            drawPath(getPoints('int'), '#c96f53', 1.5);
            drawPath(getPoints('con'), '#3b5943', 3.5); 

            document.getElementById('lesson-box').innerText = dataConfig[activeTab].msg;
        }

        function switchTab(el, tabName) {
            document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            activeTab = tabName;
            drawChart();
        }

        window.addEventListener('resize', drawChart);
        setTimeout(drawChart, 50);
    </script>
</body>
</html>
